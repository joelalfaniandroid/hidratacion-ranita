name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Prepare sounds folder
        run: |
          mkdir -p sounds
          mv *.mp3 *.wav sounds/ 2>/dev/null || true

      - name: Update buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
[app]
title = Hidratacion de Ranita
package.name = hidratacionranita
package.domain = org.ranita
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,mp3,wav,ttf,json
version = 1.4
requirements = python3,kivy==2.2.1
orientation = portrait
fullscreen = 0
icon.filename = %(source.dir)s/icon.png
[buildozer]
log_level = 2
warn_on_root = 1
[app:android]
android.api = 31
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a
android.permissions = VIBRATE,WAKE_LOCK
android.accept_sdk_license = True
p4a.bootstrap = sdl2
EOF

      - name: Build with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hidratacion-v1.4
          path: ${{ steps.buildozer.outputs.filename }}
